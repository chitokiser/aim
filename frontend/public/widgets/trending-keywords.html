<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>AI119 Trending Keywords Widget</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Malgun Gothic", sans-serif;
    background: transparent;
  }
  .widget {
    padding: 1.25rem;
    border-radius: 12px;
    background: #f6f3e9;
    border: 1px solid rgba(0,0,0,0.08);
  }
  .widget h3 {
    margin: 0 0 0.75rem;
    font-size: 0.8rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: #933c1f;
  }
  .widget ol {
    margin: 0;
    padding: 0;
    list-style: none;
    font-size: 0.85rem;
    line-height: 1.6;
    color: #313131;
  }
  .widget li {
    display: flex;
    gap: 0.5rem;
    padding: 0.3rem 0;
    border-bottom: 1px solid rgba(0,0,0,0.05);
    align-items: center;
  }
  .widget li:last-child { border-bottom: none; }
  .widget .rank {
    font-weight: 700;
    min-width: 1.25rem;
    color: #933c1f;
  }
  .widget .title {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .widget .updated {
    margin: 0.75rem 0 0;
    font-size: 0.7rem;
    opacity: 0.5;
    color: #313131;
  }
</style>
</head>
<body>
  <div class="widget">
    <h3>🔥 실시간 검색어 순위</h3>
    <ol id="trending-list"><li>불러오는 중...</li></ol>
    <p class="updated">10분마다 자동 갱신</p>
  </div>
  <script>
    var API = "https://ai119-bot-production.up.railway.app/api/blog/trending-keywords";

    function render(data) {
      var list = document.getElementById("trending-list");
      if (!list || !Array.isArray(data)) return;
      list.innerHTML = "";
      data.slice(0, 10).forEach(function (item, i) {
        var li = document.createElement("li");
        var rank = document.createElement("span");
        rank.className = "rank";
        rank.textContent = i + 1;
        var title = document.createElement("span");
        title.className = "title";
        title.textContent = item.title;
        li.appendChild(rank);
        li.appendChild(title);
        list.appendChild(li);
      });
    }

    function load() {
      fetch(API)
        .then(function (r) { return r.json(); })
        .then(render)
        .catch(function () {});
    }

    load();
    setInterval(load, 600000);
  </script>
</body>
</html>
